; ESP32-S3 Host Bridge
; Receives JSON frames from the ESP32-C6 coordinator over UART and forwards
; them to the application via callbacks (see uart_c6_bridge.h).
;
; Physical wiring (default, see uart_c6_config.h to change):
;   S3 GPIO18 (UART1 TX) → C6 GPIO2  (RX)
;   S3 GPIO17 (UART1 RX) ← C6 GPIO21 (TX)
;   GND ↔ GND
;
; To flash:
;   pio run -e host_bridge --target upload
;
; To open serial monitor (USB CDC):
;   pio device monitor -e host_bridge

[platformio]
src_dir = src

[env:host_bridge]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -I${PROJECT_DIR}
build_src_filter = +<*> +<../*.cpp>
upload_speed = 460800
upload_protocol = esptool
