; ESP32-C6 Zigbee Coordinator + ESP32-S3 Host Bridge
;
; To flash coordinator (C6):
;   pio run -e coordinator --target upload
; To flash host bridge (S3):
;   pio run -e host_bridge --target upload
; To open serial monitor:
;   pio device monitor -e coordinator
;   pio device monitor -e host_bridge

[platformio]
src_dir = .

; ----------------------------------------------------------------
; ESP32-C6 Zigbee Coordinator
; Wiring: C6 GPIO2 (RX) ← Host TX  |  C6 GPIO21 (TX) → Host RX
; ----------------------------------------------------------------
[env:coordinator]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.10/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
board_build.partitions = zigbee_zczr.csv
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DZIGBEE_MODE_COORDINATOR
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -Icoordinator/include
build_src_filter = +<coordinator/src/*>
extra_scripts = pre:coordinator/link_zigbee.py
upload_speed = 460800
upload_protocol = esptool

; ----------------------------------------------------------------
; ESP32-S3 Host Bridge
; Wiring: S3 GPIO18 (TX) → C6 GPIO2 (RX)  |  S3 GPIO17 (RX) ← C6 GPIO21 (TX)
; ----------------------------------------------------------------
[env:host_bridge]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    -Ihost_bridge
build_src_filter = +<host_bridge/src/*> +<host_bridge/*.cpp>
upload_speed = 460800
upload_protocol = esptool
