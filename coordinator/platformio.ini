; ESP32-C6 Zigbee Coordinator
; Requires arduino-esp32 3.x (espressif32 >= 6.7.0) for Zigbee support.
;
; Physical wiring (default):
;   C6 GPIO2  (UART1 RX) ← Host MCU TX
;   C6 GPIO21 (UART1 TX) → Host MCU RX
;   GND ↔ GND
;
; To flash:
;   pio run -e coordinator --target upload
;
; To open serial monitor (USB CDC):
;   pio device monitor -e coordinator

[env:coordinator]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/53.03.10/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
board_build.partitions = zigbee_zczr.csv
monitor_speed = 115200
lib_deps =
    bblanchon/ArduinoJson@^7.0
build_flags =
    -DCORE_DEBUG_LEVEL=1
    -DZIGBEE_MODE_COORDINATOR
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
extra_scripts = pre:link_zigbee.py
upload_speed = 460800
upload_protocol = esptool
